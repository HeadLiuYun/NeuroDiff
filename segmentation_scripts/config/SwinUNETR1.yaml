NAME: 'SwinUNETR'

MODEL:
  model_type: 'SwinUNETR'  # 'mala' or 'superhuman' or 'UMamba or 'SegMamba'
  input_nc: 1
  output_nc: 3
  if_sigmoid: True
  # for 'mala':
  init_mode_mala: 'kaiming'
  filters:
    - 28
    - 36
    - 48
    - 64
    - 80
  upsample_mode: 'transposeS'  # 'bilinear', 'nearest', 'transpose', 'transposeS'
  decode_ratio: 1
  merge_mode: 'cat'  # 'add', 'cat'
  pad_mode: 'zero'  # 'zero', 'replicate'
  bn_mode: 'async'  # 'sync', 'async'
  relu_mode: 'elu'  # 'elu', 'relu', 'leaky'
  init_mode: 'kaiming_normal'  # 'kaiming_normal', 'kaiming_uniform', 'xavier_normal', 'xavier_uniform'

TRAIN:
  resume: False
  if_valid: False
  min_valid_iters: 190000
  cache_path: './caches/'
  save_path: './models/'
  pad: 0
  loss_func: 'BCELoss'   # 'MSELoss', 'BCELoss'

  opt_type: 'adam'
  total_iters: 200000 # 总迭代次数 '300000'
  warmup_iters: 0
  base_lr: 0.0001
  end_lr: 0.0001
  display_freq: 100
  valid_freq: 1000
  save_freq: 1000
  min_save_iters : 190000
  decay_iters: 200000
  weight_decay: ~
  power: 1.5

  batch_size: 2
  num_workers: 4
  if_cuda: True

  random_seed: 555  # -1 is none

DATA:
  dataset_name: 't-NeuroDiff'
  train_split: 16 # 决定用前几张 若为 5 ，则 (256, 1024, 1024)  →  (5, 1024, 1024)
  label_crop_size: ~
  test_split: -50 # 决定用后几张为验证集 负数代表用前几张
  data_folder: './data'
  if_norm_images: False
  scale_factor: 1.5
  min_noise_std: 0.01
  max_noise_std: 0.2
  min_kernel_size: 3
  max_kernel_size: 9
  min_sigma: 0
  max_sigma: 2

  per_mode: 1
  if_scale_aug: False
  if_intensity_aug: True
  if_noise_aug: True
  if_blur_aug: True
  if_mask_aug: True
  if_sobel_aug: False
  if_mixup_aug: False
  if_misalign_aug: True
  if_elastic_aug: False
  if_artifact_aug: False
  if_missing_aug: False
  if_blurenhanced_aug: False

TEST:
  pad: 0
  model_name: ''
